---
name: Create GitHub Release
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
permissions:
  contents: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes and create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          # Find previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^${TAG}$" | head -1)

          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"%s" HEAD)
          else
            LOG=$(git log --pretty=format:"%s" "${PREV_TAG}..${TAG}")
          fi

          # Parse conventional commits into sections
          FEATS=$(echo "$LOG" | grep -E '^feat(\(.+\))?(!)?:' | grep -v '\[skip ci\]' | sed 's/^feat([^)]*): /- /;s/^feat: /- /' || true)
          FIXES=$(echo "$LOG" | grep -E '^fix(\(.+\))?(!)?:' | grep -v '\[skip ci\]' | sed 's/^fix([^)]*): /- /;s/^fix: /- /' || true)
          PERF=$(echo "$LOG"  | grep -E '^perf(\(.+\))?(!)?:' | grep -v '\[skip ci\]' | sed 's/^perf([^)]*): /- /;s/^perf: /- /' || true)

          # Build release name from first feat commit (or tag if none)
          FIRST_FEAT=$(echo "$FEATS" | head -1 | sed 's/^- //')
          if [ -n "$FIRST_FEAT" ]; then
            RELEASE_NAME="${TAG} — ${FIRST_FEAT}"
          else
            RELEASE_NAME="${TAG}"
          fi

          # Build body
          BODY="## What's new"$'\n'

          if [ -n "$FEATS" ]; then
            BODY="${BODY}"$'\n'"### Features"$'\n'"${FEATS}"$'\n'
          fi

          if [ -n "$FIXES" ]; then
            BODY="${BODY}"$'\n'"### Fixes"$'\n'"${FIXES}"$'\n'
          fi

          if [ -n "$PERF" ]; then
            BODY="${BODY}"$'\n'"### Performance"$'\n'"${PERF}"$'\n'
          fi

          BODY="${BODY}"$'\n'"## Install"$'\n'
          BODY="${BODY}"'```bash'$'\n'
          BODY="${BODY}"'npx skills add bmsuisse/skills'$'\n'
          BODY="${BODY}"'```'

          gh release create "${TAG}" \
            --title "${RELEASE_NAME}" \
            --notes "${BODY}"
