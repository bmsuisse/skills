[project]
site_name = "BMS Skills"
site_description = "Reusable AI agent skills for the BMSuisse engineering team — composable instructions that extend coding agents with company-specific workflows and best practices."
site_url = "https://bmsuisse.github.io/skills/"

nav = [
  { "Getting Started" = [
    { "Introduction" = "index.md" },
    { "Installation" = "installation.md" },
    { "How It Works" = "how-it-works.md" },
  ]},
]

[project.repo]
url = "https://github.com/bmsuisse/skills"

[project.theme]
favicon = "assets/logo.svg"
logo = "assets/logo.svg"
name = ""

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[project.theme.features]
extra_css = ["assets/extra.css"]

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "deep-purple"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "deep-purple"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/bmsuisse/skills"
